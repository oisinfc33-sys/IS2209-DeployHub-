<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeployHub Weather</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #333; }
        input { padding: 10px; width: 300px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: white; border-radius: 8px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        .error { color: red; }
        nav a { margin-right: 15px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <nav><a href="/">Home</a><a href="/status">Status</a></nav>
    <h1>🌤 DeployHub Weather</h1>
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="searchWeather()">Search</button>
    <div id="result"></div>

    <h2>Recent Searches</h2>
    <table>
        <tr><th>City</th><th>Country</th><th>Temp (°C)</th><th>Description</th><th>Time</th></tr>
        {% for s in recent %}
        <tr>
            <td>{{ s.city }}</td>
            <td>{{ s.country }}</td>
            <td>{{ s.temperature }}</td>
            <td>{{ s.description }}</td>
            <td>{{ s.searched_at.strftime('%Y-%m-%d %H:%M') }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5">No searches yet.</td></tr>
        {% endfor %}
    </table>

    <script>
        async function searchWeather() {
            const city = document.getElementById('cityInput').value;
            const res = await fetch(`/weather?city=${encodeURIComponent(city)}`);
            const data = await res.json();
            const div = document.getElementById('result');
            div.style.display = 'block';
            if (data.error) {
                div.innerHTML = `<p class="error">❌ ${data.error}</p>`;
            } else {
                div.innerHTML = `
                    <h2>${data.city}, ${data.country}</h2>
                    <img src="https://openweathermap.org/img/wn/${data.icon}@2x.png">
                    <p><strong>${data.description}</strong></p>
                    <p>🌡 Temperature: ${data.temperature}°C (feels like ${data.feels_like}°C)</p>
                    <p>💧 Humidity: ${data.humidity}%</p>
                `;
                setTimeout(() => location.reload(), 15000);
            }
        }
        document.getElementById('cityInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchWeather();
        });
    </script>
</body>
</html>
